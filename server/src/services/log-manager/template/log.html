    <script>
      JSONViewer = (function () {
        var JSONViewer = function () {
          this._dom = {};
          this._dom.container = document.createElement("pre");
          this._dom.container.classList.add("json-viewer");
        };
        JSONViewer.prototype.showJSON = function (json, maxLvl, colAt) {
          maxLvl = typeof maxLvl === "number" ? maxLvl : -1; // max level
          colAt = typeof colAt === "number" ? colAt : -1; // collapse at

          var jsonData = this._processInput(json);
          var walkEl = this._walk(jsonData, maxLvl, colAt, 0);

          this._dom.container.innerHTML = "";
          this._dom.container.appendChild(walkEl);
        };

        JSONViewer.prototype.getContainer = function () {
          return this._dom.container;
        };

        JSONViewer.prototype._processInput = function (json) {
          return json;
          // if(json && typeof json === 'object') {
          //     return json;
          // } else {
          //     throw 'Input value is not object or array!';
          // }
        };

        JSONViewer.prototype._walk = function (
          value,
          maxLvl,
          colAt,
          lvl,
          copyKey = "",
        ) {
          var frag = document.createDocumentFragment();
          var isMaxLvl = maxLvl >= 0 && lvl >= maxLvl;
          var isCollapse = colAt >= 0 && lvl >= colAt;
          switch (typeof value) {
            case "object":
              if (value) {
                var isArray = Array.isArray(value);
                var items = isArray ? value : Object.keys(value);
                if (lvl === 0) {
                  // root level
                  var rootCount = this._createItemsCount(items.length);
                  // hide/show
                  var rootLink = this._createLink(isArray ? "[" : "{");

                  if (items.length) {
                    rootLink.addEventListener(
                      "click",
                      function () {
                        if (isMaxLvl) return;

                        rootLink.classList.toggle("collapsed");
                        rootCount.classList.toggle("hide");

                        // main list
                        this._dom.container
                          .querySelector("ul")
                          .classList.toggle("hide");
                      }.bind(this),
                    );

                    if (isCollapse) {
                      rootLink.classList.add("collapsed");
                      rootCount.classList.remove("hide");
                    }
                  } else {
                    rootLink.classList.add("empty");
                  }

                  rootLink.appendChild(rootCount);
                  frag.appendChild(rootLink);
                }

                if (items.length && !isMaxLvl) {
                  var len = items.length - 1;
                  var ulList = document.createElement("ul");
                  ulList.setAttribute("data-level", lvl);
                  ulList.classList.add(
                    "type-" + (isArray ? "array" : "object"),
                  );

                  items.forEach(function (key, ind) {
                    var item = isArray ? key : value[key];
                    var li = document.createElement("li");
                    copyKey =
                      (copyKey ? `${copyKey}.` : "") +
                      (typeof key === "string" ? key : "");

                    if (typeof item === "object") {
                      var isEmpty = false;

                      // null && date
                      if (!item || item instanceof Date) {
                        li.appendChild(
                          document.createTextNode(isArray ? "" : key + ": "),
                        );
                        li.appendChild(this._createSimple(item ? item : null));
                      }
                      // array & object
                      else {
                        var itemIsArray = Array.isArray(item);
                        var itemLen = itemIsArray
                          ? item.length
                          : Object.keys(item).length;

                        // empty
                        if (!itemLen) {
                          li.appendChild(
                            document.createTextNode(
                              key + ": " + (itemIsArray ? "[]" : "{}"),
                            ),
                          );
                        } else {
                          // 1+ items
                          var itemTitle =
                            (typeof key === "string" ? key + ": " : "") +
                            (itemIsArray ? "[" : "{");
                          var itemLink = this._createLink(itemTitle, key);
                          var itemsCount = this._createItemsCount(itemLen);

                          // maxLvl - only text, no link
                          if (maxLvl >= 0 && lvl + 1 >= maxLvl) {
                            li.appendChild(document.createTextNode(itemTitle));
                          } else {
                            itemLink.appendChild(itemsCount);
                            li.appendChild(itemLink);
                          }

                          li.appendChild(
                            this._walk(item, maxLvl, colAt, lvl + 1, key),
                          );
                          li.appendChild(
                            document.createTextNode(itemIsArray ? "]" : "}"),
                          );

                          var list = li.querySelector("ul");
                          var itemLinkCb = function () {
                            itemLink.classList.toggle("collapsed");
                            itemsCount.classList.toggle("hide");
                            list.classList.toggle("hide");
                          };

                          // hide/show
                          itemLink.addEventListener("click", itemLinkCb);

                          // collapse lower level
                          if (colAt >= 0 && lvl + 1 >= colAt) {
                            itemLinkCb();
                          }
                        }
                      }
                    }
                    // simple values
                    else {
                      // object keys with key:
                      if (!isArray) {
                        li.appendChild(document.createTextNode(key + ": "));
                      }
                      // copyKey = '';
                      // recursive
                      li.appendChild(
                        this._walk(item, maxLvl, colAt, lvl + 1, key),
                      );
                    }

                    // add comma to the end
                    if (ind < len) {
                      li.appendChild(document.createTextNode(","));
                    }

                    ulList.appendChild(li);
                  }, this);

                  frag.appendChild(ulList);
                } else if (items.length && isMaxLvl) {
                  var itemsCount = this._createItemsCount(items.length);
                  itemsCount.classList.remove("hide");

                  frag.appendChild(itemsCount);
                }

                if (lvl === 0) {
                  // empty root
                  if (!items.length) {
                    var itemsCount = this._createItemsCount(0);
                    itemsCount.classList.remove("hide");

                    frag.appendChild(itemsCount);
                  }

                  // root cover
                  frag.appendChild(
                    document.createTextNode(isArray ? "]" : "}"),
                  );

                  // collapse
                  if (isCollapse) {
                    frag.querySelector("ul").classList.add("hide");
                  }
                }
                break;
              }

            default:
              // simple values
              frag.appendChild(this._createSimple(value));
              break;
          }

          return frag;
        };
        JSONViewer.prototype._createSimple = function (value) {
          var spanEl = document.createElement("span");
          var type = typeof value;
          var txt = value;

          if (type === "string") {
            txt = "&quot;" + value + "&quot;";
          } else if (value === null) {
            type = "null";
            txt = "null";
          } else if (value === undefined) {
            txt = "undefined";
          } else if (value instanceof Date) {
            type = "date";
            txt = value.toString();
          }
          spanEl.classList.add("type-" + type);
          spanEl.setAttribute("data-copy-value", value);
          spanEl.innerHTML = txt;

          return spanEl;
        };

        JSONViewer.prototype._createItemsCount = function (count) {
          var itemsCount = document.createElement("span");
          itemsCount.classList.add("items-ph");
          itemsCount.classList.add("hide");
          itemsCount.innerHTML = this._getItemsTitle(count);

          return itemsCount;
        };

        JSONViewer.prototype._createLink = function (title, key = null) {
          var linkEl = document.createElement("a");
          linkEl.classList.add("list-link");
          linkEl.href = "javascript:void(0)";
          linkEl.setAttribute("data-copy-path", key);
          linkEl.innerHTML = title || "";

          return linkEl;
        };

        JSONViewer.prototype._getItemsTitle = function (count) {
          var itemsTxt = count > 1 || count === 0 ? "items" : "item";

          return count + " " + itemsTxt;
        };

        return JSONViewer;
      })();
    </script>

      // copy pest methods {
      const copyToClipboard = (data) => {
        navigator.clipboard.writeText(data);
        /*.then(() => console.log(`Copied: ${data}`))
        .catch(err => console.error('Copy failed:', err));*/
      };

      const highlightMatchingText = (element, value) => {
        const text = element.textContent;

        if (text.includes(value)) {
          const range = document.createRange();
          const startIndex = text.indexOf(value);
          const endIndex = startIndex + value.length;

          // Set range to matching text
          range.setStart(element.firstChild, startIndex);
          range.setEnd(element.firstChild, endIndex);

          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
        }
      };

      let dataForCopy = null;
      $(document).on("mouseup", "[data-copy-value]", function () {
        let el = $(this);
        const value = el.attr("data-copy-value");
        dataForCopy = value;
        // Highlight matching text if no text is selected
        if (!window.getSelection().toString().trim()) {
          highlightMatchingText(el[0], value);
        }
      });

      // Clear selection when clicking outside
      $(document).on("mousedown", function (e) {
        // clear value selection
        if (!$(e.target).closest("[data-copy-value]").length) {
          clearSelection();
        }

        // clear object selection
        if ($(".json-viewer .object-selected-active").length)
          $(".json-viewer")
            .find(".object-selected-active")
            .removeClass("object-selected-active");
      });

      // Highlight helper function
      const highlightText = (element) => {
        const range = document.createRange();
        range.selectNodeContents(element);

        const selection = window.getSelection();
        selection.removeAllRanges(); // Clear any previous selection
        selection.addRange(range);
      };

      // Clear highlight function
      const clearSelection = () => {
        dataForCopy = null;
        window.getSelection().removeAllRanges();
      };
      // } copy pest methods

      $(document).on("click", "[data-copy-path]", function () {
        const pathParts = [];

        // Start from the clicked element and move up the DOM
        $(".json-viewer").removeAttr("copy-path-selected-item");
        let el = $(this);
        el.attr("copy-path-selected-item", 1);
        while (el.length) {
          const link = el.closest("li").find("a[data-copy-path]").first();
          if (link.length) {
            pathParts.unshift(link.data("copy-path"));
          }

          // Move to the parent of the el parent
          el = el.closest("ul").closest("li");
        }

        // Combine the collected paths
        dataForCopy = pathParts.join(".");
      });

      document.addEventListener("keydown", function (e) {
        // if(e.altKey && e.code === 'KeyC') {
        //     if(dataForCopy) copyToClipboard(dataForCopy);
        // }

        if (e.ctrlKey && e.code === "KeyC") {
          if (dataForCopy) copyToClipboard(dataForCopy);
        }
      });

      $(document).on("dblclick", "li.active", function () {
        let el = $(this);
        $(".json-viewer")
          .find(".object-selected-active")
          .removeClass("object-selected-active");
        el.addClass("object-selected-active");
      });
